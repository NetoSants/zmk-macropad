CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y
CONFIG_ZMK_POINTING=y
CONFIG_SETTINGS=y
CONFIG_ZMK_BEHAVIOR_LOCAL_ID_TYPE_SETTINGS_TABLE=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=1000
CONFIG_USB_DEVICE_STACK=y

# Usa oscilador RC interno no lugar do cristal 32kHz externo (para clones com cristal marginal)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Aumenta potência do TX BLE para +8dBm
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
