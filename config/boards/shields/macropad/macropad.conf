CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=n

# Disable crypto in controller — move AES-CCM to host
# Reduces radio ISR timing pressure; host handles encryption
CONFIG_BT_CTLR_CRYPTO=n

# Disable controller-initiated connection parameter negotiation
# Prevents param change requests during keypress that may cause timing loss
CONFIG_BT_CTLR_CONN_PARAM_REQ=n

# Disable peripheral-initiated LL_FEATURE_REQ exchange
CONFIG_BT_CTLR_PER_INIT_FEAT_XCHG=n

# Minimum Data Length Extension (27 bytes default)
# Fewer bytes per packet = less radio time per transmission
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# 6-second supervision timeout (max for BLE, double the 3s default)
# More tolerance for delayed radio responses
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=6000

# Conservative connection intervals: min 30ms, max 100ms
CONFIG_BT_PERIPHERAL_PREF_INTERVAL_MIN=50
CONFIG_BT_PERIPHERAL_PREF_INTERVAL_MAX=80

# Dynamic TX power control
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y

# Disable sleep
CONFIG_ZMK_SLEEP=n

# Stacks and heap for BLE stability
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=4096

# Disable 2M PHY (already default-off but explicit)
CONFIG_BT_CTLR_PHY_2M=n

# Settings + clear bonds on start for testing
CONFIG_SETTINGS=y
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y


