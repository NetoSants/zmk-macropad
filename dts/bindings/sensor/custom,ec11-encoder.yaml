# SPDX-License-Identifier: MIT

description: Custom EC11 encoder driver for ZMK

compatible: "custom,ec11-encoder"

properties:
  a-gpios:
    type: phandle-array
    required: true
    description: GPIO for encoder channel A

  b-gpios:
    type: phandle-array
    required: true
    description: GPIO for encoder channel B

  steps:
    type: int
    required: false
    default: 80
    description: Number of steps per revolution
